<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mizan — Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    body { background: var(--color-bg); }

    /* ── Header ── */
    .page-header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      height: 81px;
      display: flex;
      align-items: center;
      padding: 0 235.5px;
      flex-shrink: 0;
    }

    .page-header__title {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 24px;
      line-height: 32px;
      color: var(--color-text-heading);
    }

    /* ── Content ── */
    .page-content {
      max-width: 672px;
      margin: 0 auto;
      padding: 32px 24px 100px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Cards ── */
    .profile-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-sm);
      padding: 25px;
    }

    /* ── Identity card ── */
    .identity-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--color-primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 400;
      flex-shrink: 0;
    }

    .identity-name {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 20px;
      line-height: 28px;
      color: var(--color-text-heading);
    }

    .identity-email {
      font-size: 14px;
      line-height: 20px;
      color: var(--color-text-muted);
      margin-top: 2px;
    }

    /* ── Section heading inside card ── */
    .card-section-title {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 18px;
      line-height: 28px;
      color: var(--color-text-heading);
      margin-bottom: 4px;
    }

    .card-section-subtitle {
      font-size: 14px;
      line-height: 20px;
      color: var(--color-text-muted);
      margin-bottom: 16px;
    }

    /* ── IBAN input ── */
    .iban-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .iban-field label {
      font-size: 14px;
      font-weight: 500;
      line-height: 14px;
      color: var(--color-text-heading);
    }

    .iban-input {
      height: 36px;
      padding: 4px 12px;
      border: 1px solid var(--color-border-input);
      border-radius: var(--radius-input);
      font-family: 'Menlo', 'Courier New', monospace;
      font-size: 14px;
      line-height: 20px;
      color: var(--color-text-body);
      background: var(--color-surface);
      outline: none;
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
      letter-spacing: 0.03em;
    }
    .iban-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-soft);
    }

    /* ── Save IBAN button ── */
    .save-btn {
      height: 36px;
      padding: 0 16px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .save-btn:hover:not(:disabled) { background: var(--color-primary-hover); }
    .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    
    /* ── Info rows ── */
    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--color-border);
      font-size: 14px;
    }
    .info-row:last-of-type { border-bottom: none; }

    .info-row__label {
      color: var(--color-text-muted);
      line-height: 20px;
    }

    .info-row__value {
      font-size: 16px;
      font-weight: 500;
      color: var(--color-text-heading);
      line-height: 24px;
    }

    /* ── Copy invite button ── */
    .copy-invite-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 36px;
      background: var(--color-bg);
      border: 1px solid var(--color-primary);
      border-radius: var(--radius-btn);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      color: var(--color-primary);
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 12px;
    }
    .copy-invite-btn:hover { background: var(--color-primary-soft); }
    .copy-invite-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Sign out button ── */
    .signout-btn {
      width: 100%;
      height: 36px;
      background: var(--color-bg);
      border: 1px solid var(--color-red);
      border-radius: var(--radius-btn);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      color: var(--color-red);
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .signout-btn:hover { background: var(--color-error-bg); }

    /* ── Inline banner ── */
    .inline-banner {
      font-size: 13px;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      display: none;
      margin-top: 8px;
    }
    .inline-banner.error   { display: block; background: var(--color-error-bg);   color: var(--color-error-text);   border: 1px solid var(--color-error-border); }
    .inline-banner.success { display: block; background: var(--color-success-bg); color: var(--color-success-text); border: 1px solid var(--color-success-border); }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 81px;
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      z-index: 100;
    }

    .bottom-nav__inner {
      width: 100%;
      max-width: 1143px;
      margin: 0 auto;
      padding: 0 59.5px;
      display: flex;
      align-items: center;
      justify-content: space-around;
    }

    .nav-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      color: var(--color-text-muted);
      text-decoration: none;
      font-size: 12px;
      border-radius: 12px;
      transition: color 0.15s;
    }
    .nav-link svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .nav-link:hover { text-decoration: none; color: var(--color-primary); }
    .nav-link.active { color: var(--color-primary); background: rgba(124,58,237,0.1); }

    .nav-add {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      font-size: 12px;
      color: var(--color-primary);
    }
    .nav-add__icon {
      width: 44px; height: 44px;
      background: var(--color-primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(124,58,237,0.4);
      margin-top: -8px;
    }
    .nav-add__icon svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; }

    @media (max-width: 768px) {
      .page-header  { padding: 0 16px; }
      .page-content { padding: 24px 16px 100px; }
      .bottom-nav__inner { padding: 0 8px; }
    }
  </style>
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="page-header">
    <h1 class="page-header__title">Profile</h1>
  </header>

  <!-- ── Content ─────────────────────────────────────────── -->
  <main class="page-content">

    <!-- Identity card -->
    <div class="profile-card">
      <div class="identity-row">
        <div id="avatar" class="profile-avatar">?</div>
        <div>
          <div id="profileName" class="identity-name">Loading…</div>
          <div id="profileEmail" class="identity-email"></div>
        </div>
      </div>
    </div>

    <!-- IBAN card -->
    <div class="profile-card">
      <div class="card-section-title">Your IBAN</div>
      <div class="card-section-subtitle">This is shown to roommates when they need to settle up with you</div>

      <div class="iban-field">
        <label for="ibanInput">IBAN Number</label>
        <input
          id="ibanInput"
          class="iban-input"
          type="text"
          placeholder="SA00 0000 0000 0000 0000 0000"
          autocomplete="off"
          maxlength="34"
        />
      </div>

      <button id="saveIbanBtn" class="save-btn" type="button">Save IBAN</button>
      <div id="ibanBanner" class="inline-banner"></div>
    </div>

    <!-- Household card -->
    <div class="profile-card">
      <div class="card-section-title">Your Household</div>

      <div style="margin-top: 16px;">
        <div class="info-row">
          <span class="info-row__label">Name</span>
          <span id="hhName" class="info-row__value">—</span>
        </div>
        <div class="info-row">
          <span class="info-row__label">Members</span>
          <span id="hhMembers" class="info-row__value">—</span>
        </div>
        <div class="info-row">
          <span class="info-row__label">Joined</span>
          <span id="hhJoined" class="info-row__value">—</span>
        </div>
      </div>

      <button id="copyInviteBtn" class="copy-invite-btn" type="button">
        <svg viewBox="0 0 16 16">
          <rect x="5.5" y="5.5" width="8" height="8" rx="1"/>
          <path d="M10.5 5.5V3.5a1 1 0 0 0-1-1h-6a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2"/>
        </svg>
        <span id="copyBtnLabel">Copy invite code</span>
      </button>
      <div id="inviteBanner" class="inline-banner"></div>
    </div>

    <!-- Sign out -->
    <button id="signOutBtn" class="signout-btn" type="button">Sign out</button>

  </main>

  <!-- ── Bottom Nav ──────────────────────────────────────── -->
  <nav class="bottom-nav">
    <div class="bottom-nav__inner">
      <a href="dashboard.html" class="nav-link">
        <svg viewBox="0 0 20 20"><path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M7 18v-6h6v6"/></svg>
        Home
      </a>
      <a href="history.html" class="nav-link">
        <svg viewBox="0 0 20 20"><rect x="4" y="2" width="12" height="16" rx="1"/><line x1="7" y1="7" x2="13" y2="7"/><line x1="7" y1="10" x2="13" y2="10"/><line x1="7" y1="13" x2="10" y2="13"/></svg>
        Expenses
      </a>
      <a href="addـexpense.html" class="nav-add">
        <div class="nav-add__icon">
          <svg viewBox="0 0 22 22"><line x1="11" y1="3" x2="11" y2="19"/><line x1="3" y1="11" x2="19" y2="11"/></svg>
        </div>
        <span>Add</span>
      </a>
      <a href="profile.html" class="nav-link active">
        <svg viewBox="0 0 20 20"><circle cx="10" cy="6" r="3"/><path d="M3 18c0-3.866 3.134-7 7-7s7 3.134 7 7"/></svg>
        Profile
      </a>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>

  <script>
    let currentUserId  = null;
    let inviteCode     = null;

    // ── DOM ────────────────────────────────────────────────
    const avatarEl      = document.getElementById('avatar');
    const profileName   = document.getElementById('profileName');
    const profileEmail  = document.getElementById('profileEmail');
    const ibanInput     = document.getElementById('ibanInput');
    const saveIbanBtn   = document.getElementById('saveIbanBtn');
    const ibanBanner    = document.getElementById('ibanBanner');
    const hhName        = document.getElementById('hhName');
    const hhMembers     = document.getElementById('hhMembers');
    const hhJoined      = document.getElementById('hhJoined');
    const copyInviteBtn = document.getElementById('copyInviteBtn');
    const copyBtnLabel  = document.getElementById('copyBtnLabel');
    const inviteBanner  = document.getElementById('inviteBanner');
    const signOutBtn    = document.getElementById('signOutBtn');

    // ── Helpers ────────────────────────────────────────────
    function showBanner(el, type, msg) {
      el.textContent = msg;
      el.className = `inline-banner ${type}`;
      setTimeout(() => { el.className = 'inline-banner'; }, 3000);
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-SA', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ── IBAN auto-format ───────────────────────────────────
    ibanInput.addEventListener('input', () => {
      let raw = ibanInput.value.replace(/\s+/g, '').toUpperCase();
      ibanInput.value = raw.match(/.{1,4}/g)?.join(' ') ?? raw;
    });

    // ── Save IBAN ──────────────────────────────────────────
    saveIbanBtn.addEventListener('click', async () => {
      const iban = ibanInput.value.replace(/\s+/g, '');
      if (!iban) { showBanner(ibanBanner, 'error', 'Please enter an IBAN.'); return; }

      saveIbanBtn.disabled = true;
      saveIbanBtn.textContent = 'Saving…';

      const { error } = await sb
        .from('users')
        .update({ iban })
        .eq('id', currentUserId);

      saveIbanBtn.disabled = false;
      saveIbanBtn.textContent = 'Save IBAN';

      if (error) {
        showBanner(ibanBanner, 'error', error.message);
      } else {
        showBanner(ibanBanner, 'success', 'IBAN saved successfully.');
      }
    });

    // ── Copy invite code ───────────────────────────────────
    copyInviteBtn.addEventListener('click', async () => {
      if (!inviteCode) {
        showBanner(inviteBanner, 'error', 'No invite code found.');
        return;
      }
      try {
        const url = `${window.location.origin}/household-join.html?code=${inviteCode}`;
        await navigator.clipboard.writeText(url);
        copyBtnLabel.textContent = 'Copied!';
        setTimeout(() => { copyBtnLabel.textContent = 'Copy invite code'; }, 2000);
      } catch {
        showBanner(inviteBanner, 'error', `Your code: ${inviteCode}`);
      }
    });

    // ── Sign out ───────────────────────────────────────────
    signOutBtn.addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    });

    // ── Boot ───────────────────────────────────────────────
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'signin.html'; return; }
      currentUserId = session.user.id;

      // Load user profile
      const { data: profile } = await sb
        .from('users')
        .select('full_name, email, iban, household_id, created_at')
        .eq('id', currentUserId)
        .single();

      if (!profile) { window.location.href = 'signin.html'; return; }

      // Populate identity card
      const firstName = profile.full_name?.split(' ')[0] || '?';
      avatarEl.textContent    = firstName[0].toUpperCase();
      profileName.textContent = profile.full_name || '—';
      profileEmail.textContent = profile.email || session.user.email || '—';

      // Populate IBAN (formatted with spaces)
      if (profile.iban) {
        const raw = profile.iban.replace(/\s+/g, '');
        ibanInput.value = raw.match(/.{1,4}/g)?.join(' ') ?? raw;
      }

      // Load household info
      if (profile.household_id) {
        const { data: household } = await sb
          .from('households')
          .select('name, invite_code, created_at')
          .eq('id', profile.household_id)
          .single();

        if (household) {
          inviteCode = household.invite_code;
          hhName.textContent = household.name;
        }

        // Count members
        const { count } = await sb
          .from('users')
          .select('id', { count: 'exact', head: true })
          .eq('household_id', profile.household_id);

        hhMembers.textContent = count
          ? `${count} ${count === 1 ? 'person' : 'people'}`
          : '—';

        // Joined date = user's created_at
        hhJoined.textContent = profile.created_at
          ? formatDate(profile.created_at)
          : '—';
      } else {
        hhName.textContent    = 'No household yet';
        hhMembers.textContent = '—';
        hhJoined.textContent  = '—';
      }
    })();
  </script>

</body>
</html>
