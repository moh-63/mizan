<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mizan — Join Household</title>
 
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@400;500&family=Cousine&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
 
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
 
    .join-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      width: 448px;
      max-width: 100%;
      padding: 33px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
 
    /* ── Hero ── */
    .card-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }
 
    .card-hero__emoji { font-size: 48px; line-height: 48px; }
 
    .card-hero__title {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 24px;
      line-height: 32px;
      color: var(--color-text-heading);
    }
 
    .card-hero__subtitle {
      font-size: 14px;
      line-height: 20px;
      color: var(--color-text-muted);
    }
 
    /* ── Code display box ── */
    .code-preview {
      background: var(--color-bg);
      border: 2px solid var(--color-primary);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
 
    .code-preview__label {
      font-size: 12px;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
 
    .code-preview__value {
      font-family: 'Cousine', monospace;
      font-size: 32px;
      line-height: 40px;
      letter-spacing: 4px;
      color: var(--color-primary);
    }
 
    /* ── Code input ── */
    .code-input {
      height: 56px;
      padding: 0 16px;
      border: 2px solid var(--color-border-input);
      border-radius: var(--radius-input);
      font-family: 'Cousine', monospace;
      font-size: 24px;
      letter-spacing: 6px;
      text-align: center;
      text-transform: uppercase;
      color: var(--color-primary);
      background: var(--color-surface);
      outline: none;
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .code-input::placeholder {
      color: var(--color-border-input);
      letter-spacing: 4px;
      font-size: 20px;
    }
    .code-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-soft);
    }
 
    /* ── Household preview (shown after code is validated) ── */
    .household-preview {
      background: rgba(124, 58, 237, 0.06);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      display: none;
    }
 
    .household-preview.visible { display: flex; }
 
    .household-preview__icon {
      font-size: 28px;
      flex-shrink: 0;
    }
 
    .household-preview__name {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 18px;
      color: var(--color-text-heading);
    }
 
    .household-preview__meta {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-top: 2px;
    }
 
    /* ── Footer link ── */
    .card-footer {
      text-align: center;
      font-size: 14px;
      color: var(--color-text-muted);
    }
    .card-footer a { color: var(--color-primary); font-weight: 500; }
    .card-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
 
  <div class="join-card">
 
    <!-- Hero -->
    <div class="card-hero">
      <span class="card-hero__emoji">🔑</span>
      <div>
        <h1 class="card-hero__title">Join a household</h1>
        <p class="card-hero__subtitle" id="heroSubtitle">
          Enter the invite code your roommate shared with you.
        </p>
      </div>
    </div>
 
    <!-- Banner -->
    <div id="banner" class="banner" role="alert"></div>
 
    <!-- Code preview (shown when code comes from URL) -->
    <div id="codePreview" class="code-preview" style="display:none;">
      <div class="code-preview__label">Invite code</div>
      <div id="codePreviewValue" class="code-preview__value">——————</div>
    </div>
 
    <!-- Manual code input (shown when no URL param) -->
    <div class="form" id="codeForm">
      <div class="field">
        <label for="codeInput">Invite code</label>
        <input
          id="codeInput"
          class="code-input"
          type="text"
          placeholder="· · · · · ·"
          maxlength="6"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
      </div>
    </div>
 
    <!-- Household preview (shown once code is validated) -->
    <div id="householdPreview" class="household-preview">
      <span class="household-preview__icon">🏠</span>
      <div>
        <div id="previewName" class="household-preview__name">—</div>
        <div id="previewMeta" class="household-preview__meta">—</div>
      </div>
    </div>
 
    <!-- Action buttons -->
    <div class="form">
      <button id="joinBtn" class="btn btn-primary" type="button" disabled>
        <span class="spinner"></span>
        <span class="btn-label">Join household</span>
      </button>
    </div>
 
    <!-- Footer -->
    <div class="card-footer" id="cardFooter">
      Want to create your own? <a href="household.html">Create a household</a>
    </div>
 
  </div>
 
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
 
  <script>
    // ── DOM ────────────────────────────────────────────────
    const banner           = document.getElementById('banner');
    const codePreview      = document.getElementById('codePreview');
    const codePreviewValue = document.getElementById('codePreviewValue');
    const codeForm         = document.getElementById('codeForm');
    const codeInput        = document.getElementById('codeInput');
    const householdPreview = document.getElementById('householdPreview');
    const previewName      = document.getElementById('previewName');
    const previewMeta      = document.getElementById('previewMeta');
    const joinBtn          = document.getElementById('joinBtn');
    const heroSubtitle     = document.getElementById('heroSubtitle');
    const cardFooter       = document.getElementById('cardFooter');
 
    let currentSession = null;
    let resolvedCode   = '';       // final 6-char code to use on submit
    let resolvedHousehold = null;  // prefetched household data
 
    // ── Helpers ────────────────────────────────────────────
    function showError(msg)   { banner.textContent = msg; banner.className = 'banner error visible'; }
    function showSuccess(msg) { banner.textContent = msg; banner.className = 'banner success visible'; }
    function hideBanner()     { banner.className = 'banner'; }
 
    function formatMembers(count) {
      return `${count} ${count === 1 ? 'member' : 'members'} already joined`;
    }
 
    // ── Boot ───────────────────────────────────────────────
    (async () => {
      // 1. Auth check — must be signed in to join
      const { data: { session } } = await sb.auth.getSession();
 
      if (!session) {
        // Not signed in — redirect to signup, preserve code in URL
        const code = new URLSearchParams(window.location.search).get('code');
        const dest = code
          ? `signup.html?redirect=household-join.html&code=${code}`
          : 'signup.html';
        window.location.href = dest;
        return;
      }
 
      currentSession = session;
 
      // 2. If user already has a household, skip to dashboard
      const { data: profile } = await sb
        .from('users')
        .select('household_id')
        .eq('id', session.user.id)
        .single();
 
      if (profile?.household_id) {
        window.location.href = 'dashboard.html';
        return;
      }
 
      // 3. Check for ?code= in URL
      const urlCode = new URLSearchParams(window.location.search).get('code')?.toUpperCase();
 
      if (urlCode && urlCode.length === 6) {
        // Show the code and prefetch the household
        codeForm.style.display = 'none';
        codePreview.style.display = 'flex';
        codePreviewValue.textContent = urlCode;
        heroSubtitle.textContent = 'Your roommate invited you. Tap below to join!';
        resolvedCode = urlCode;
        await prefetchHousehold(urlCode);
      } else {
        // No URL code — show manual input
        codeInput.focus();
      }
    })();
 
    // ── Prefetch household info from code ──────────────────
    async function prefetchHousehold(code) {
      const { data: household } = await sb
        .from('households')
        .select('id, name, invite_expires_at')
        .eq('invite_code', code)
        .single();
 
      if (!household) {
        showError('This invite link is invalid. Ask your roommate for a new one.');
        joinBtn.disabled = true;
        return;
      }
 
      if (new Date(household.invite_expires_at) < new Date()) {
        showError('This invite link has expired. Ask your roommate to generate a new one from their Profile page.');
        joinBtn.disabled = true;
        return;
      }
 
      // Count members
      const { count } = await sb
        .from('users')
        .select('id', { count: 'exact', head: true })
        .eq('household_id', household.id);
 
      resolvedHousehold = household;
      previewName.textContent = household.name;
      previewMeta.textContent = formatMembers(count || 0);
      householdPreview.classList.add('visible');
      joinBtn.disabled = false;
    }
 
    // ── Manual code input ──────────────────────────────────
    codeInput.addEventListener('input', () => {
      codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      resolvedCode = codeInput.value;
      resolvedHousehold = null;
      householdPreview.classList.remove('visible');
      hideBanner();
 
      if (codeInput.value.length === 6) {
        joinBtn.disabled = false;
      } else {
        joinBtn.disabled = true;
      }
    });
 
    codeInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !joinBtn.disabled) joinBtn.click();
    });
 
    // ── Join ───────────────────────────────────────────────
    joinBtn.addEventListener('click', async () => {
      hideBanner();
      const code = resolvedCode.trim().toUpperCase();
      if (code.length !== 6) return;
 
      joinBtn.classList.add('loading');
      joinBtn.disabled = true;
 
      try {
        // Use prefetched household if available, otherwise fetch now
        let household = resolvedHousehold;
 
        if (!household) {
          const { data, error: findErr } = await sb
            .from('households')
            .select('id, name, invite_expires_at')
            .eq('invite_code', code)
            .single();
 
          if (findErr || !data) {
            throw new Error('Invalid invite code. Please check and try again.');
          }
 
          if (new Date(data.invite_expires_at) < new Date()) {
            throw new Error('This invite code has expired. Ask your roommate for a new one from their Profile page.');
          }
 
          household = data;
        }
 
        // Link user to the household
        const { error: updateErr } = await sb
          .from('users')
          .update({ household_id: household.id })
          .eq('id', currentSession.user.id);
 
        if (updateErr) throw updateErr;
 
        showSuccess(`You've joined "${household.name}"! Taking you to the dashboard…`);
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
 
      } catch (err) {
        showError(err.message ?? 'Something went wrong. Please try again.');
        joinBtn.classList.remove('loading');
        joinBtn.disabled = false;
      }
    });
  </script>
 
</body>
</html>
